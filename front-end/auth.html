<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login / Sign up — UWA Planner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Instrument+Sans:ital,wght@0,300;0,400;0,500;1,300&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        fontFamily: {
          sans:    ['"Instrument Sans"', 'sans-serif'],
          display: ['Syne', 'sans-serif'],
          mono:    ['"JetBrains Mono"', 'monospace'],
        },
      },
    }
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/custom.css">
</head>
<body>

  <!-- Nav injected by js/utils/components.js -->

  <!-- ── Auth card ── -->
  <div class="min-h-screen flex items-center justify-center px-6 pt-20 pb-10 page-enter">
    <div class="w-full max-w-[440px] bg-[var(--bg2)] border border-[var(--border)] rounded-xl p-9" style="box-shadow:0 24px 64px var(--shadow)">

      <!-- Tabs -->
      <div class="flex gap-1 bg-[var(--bg3)] rounded p-1 mb-7">
        <button class="auth-tab active" id="loginTab">Log in</button>
        <button class="auth-tab" id="signupTab">Sign up</button>
      </div>

      <!-- ── LOGIN ── -->
      <div id="loginForm">
        <div class="font-display text-[24px] font-extrabold text-[var(--text)] mb-1">Welcome back</div>
        <div class="text-[13px] text-[var(--text2)] mb-6">Log in to access your saved timetables</div>

        <div class="mb-4">
          <label class="block text-[12px] font-medium text-[var(--text2)] mb-1.5 tracking-[.02em]" for="loginEmail">Email address</label>
          <input class="w-full py-2.5 px-[14px] bg-[var(--bg3)] border border-[var(--border2)] rounded text-[var(--text)] text-[14px] outline-none transition-colors focus:border-[var(--accent)] placeholder:text-[var(--text3)]"
            type="email" id="loginEmail" placeholder="you@student.uwa.edu.au" autocomplete="email">
          <div class="text-[12px] text-[var(--red)] mt-1 hidden" id="loginEmailErr">Please enter a valid email address</div>
        </div>

        <div class="mb-4">
          <label class="block text-[12px] font-medium text-[var(--text2)] mb-1.5 tracking-[.02em]" for="loginPass">Password</label>
          <div class="relative">
            <input class="w-full py-2.5 px-[14px] bg-[var(--bg3)] border border-[var(--border2)] rounded text-[var(--text)] text-[14px] outline-none transition-colors focus:border-[var(--accent)] placeholder:text-[var(--text3)]"
              type="password" id="loginPass" placeholder="••••••••" autocomplete="current-password">
            <button class="input-eye" type="button" aria-label="Toggle password visibility">👁</button>
          </div>
        </div>

        <a class="block text-right text-[12px] text-[var(--accent)] cursor-pointer mb-4 hover:underline">Forgot password?</a>
        <button class="btn btn-primary btn-full" id="loginBtn">Log in</button>

        <div class="form-divider">or try a demo account</div>

        <button class="w-full py-2.5 bg-[var(--bg3)] border border-[var(--border2)] rounded text-[var(--text2)] text-[13px] font-medium flex items-center justify-center gap-2 transition-all hover:border-[var(--accent-line)] hover:text-[var(--text)] mb-2.5" type="button" id="demoLoginBtn">
          ⚡ Quick demo login
        </button>

      </div>

      <!-- ── SIGNUP ── -->
      <div id="signupForm" style="display:none">
        <div class="font-display text-[24px] font-extrabold text-[var(--text)] mb-1">Create account</div>
        <div class="text-[13px] text-[var(--text2)] mb-6">Start planning your perfect semester</div>

        <div class="grid grid-cols-2 gap-3 mb-4">
          <div>
            <label class="block text-[12px] font-medium text-[var(--text2)] mb-1.5 tracking-[.02em]" for="signFirst">First name</label>
            <input class="w-full py-2.5 px-[14px] bg-[var(--bg3)] border border-[var(--border2)] rounded text-[var(--text)] text-[14px] outline-none transition-colors focus:border-[var(--accent)] placeholder:text-[var(--text3)]"
              type="text" id="signFirst" placeholder="Alex" autocomplete="given-name">
          </div>
          <div>
            <label class="block text-[12px] font-medium text-[var(--text2)] mb-1.5 tracking-[.02em]" for="signLast">Last name</label>
            <input class="w-full py-2.5 px-[14px] bg-[var(--bg3)] border border-[var(--border2)] rounded text-[var(--text)] text-[14px] outline-none transition-colors focus:border-[var(--accent)] placeholder:text-[var(--text3)]"
              type="text" id="signLast" placeholder="Smith" autocomplete="family-name">
          </div>
        </div>

        <div class="mb-4">
          <label class="block text-[12px] font-medium text-[var(--text2)] mb-1.5 tracking-[.02em]" for="signStu">Student number</label>
          <input class="w-full py-2.5 px-[14px] bg-[var(--bg3)] border border-[var(--border2)] rounded text-[var(--text)] text-[14px] outline-none transition-colors focus:border-[var(--accent)] placeholder:text-[var(--text3)]"
            type="text" id="signStu" placeholder="21234567" maxlength="8">
          <div class="text-[12px] text-[var(--red)] mt-1 hidden" id="stuErr">Must be 8 digits starting with 2</div>
        </div>

        <div class="mb-4">
          <label class="block text-[12px] font-medium text-[var(--text2)] mb-1.5 tracking-[.02em]" for="signEmail">UWA email</label>
          <input class="w-full py-2.5 px-[14px] bg-[var(--bg3)] border border-[var(--border2)] rounded text-[var(--text)] text-[14px] outline-none transition-colors focus:border-[var(--accent)] placeholder:text-[var(--text3)]"
            type="email" id="signEmail" placeholder="21234567@student.uwa.edu.au" autocomplete="email">
          <div class="text-[12px] text-[var(--red)] mt-1 hidden" id="emailErr">Please use your @student.uwa.edu.au address</div>
        </div>

        <div class="mb-4">
          <label class="block text-[12px] font-medium text-[var(--text2)] mb-1.5 tracking-[.02em]" for="signPass">Password</label>
          <div class="relative">
            <input class="w-full py-2.5 px-[14px] bg-[var(--bg3)] border border-[var(--border2)] rounded text-[var(--text)] text-[14px] outline-none transition-colors focus:border-[var(--accent)] placeholder:text-[var(--text3)]"
              type="password" id="signPass" placeholder="Min. 8 characters" autocomplete="new-password">
            <button class="input-eye" type="button" aria-label="Toggle password visibility">👁</button>
          </div>
          <!-- Strength bar -->
          <div class="h-[3px] rounded bg-[var(--border)] mt-1.5 overflow-hidden">
            <div class="strength-fill" id="strengthFill"></div>
          </div>
          <div class="font-mono text-[10px] text-[var(--text3)] mt-1" id="strengthLabel"></div>
        </div>

        <div class="flex items-start gap-2 text-[12px] text-[var(--text2)] mb-5">
          <input type="checkbox" id="agreeCheck" class="accent-[var(--accent)] w-3.5 h-3.5 mt-0.5 flex-shrink-0">
          <label for="agreeCheck">I agree to the <a href="#" class="text-[var(--accent)]">terms of service</a> and <a href="#" class="text-[var(--accent)]">privacy policy</a></label>
        </div>

        <button class="btn btn-primary btn-full" id="signupBtn">Create account</button>
      </div>

      <div class="text-center text-[12px] text-[var(--text3)] mt-4" id="authFooter">
        Don't have an account? <a class="text-[var(--accent)] cursor-pointer" id="switchToSignupLink">Sign up free</a>
      </div>
    </div>
  </div>

  <script type="module" src="js/auth.js"></script>
</body>
</html>
